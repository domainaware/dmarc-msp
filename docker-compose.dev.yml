# Development overrides — no TLS, relaxed settings
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  postfix:
    ports:
      - "2525:25"
    environment:
      - HOSTNAME=localhost

  opensearch:
    environment:
      - plugins.security.disabled=true
    ports:
      - "9200:9200"

  opensearch-dashboards:
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
      - OPENSEARCH_SECURITY_COOKIE_SECURE=false

  nginx:
    profiles:
      - disabled

  certbot:
    profiles:
      - disabled

  dmarc-msp:
    build:
      context: .
    command: ["dmarcmsp", "serve", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - .:/app
