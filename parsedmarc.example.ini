# parsedmarc configuration for DMARC for MSPs
# Copy to parsedmarc.ini and replace the password below.
#
# parsedmarc.ini is gitignored — do not commit it.

[general]
save_aggregate = True
save_forensic = True
save_smtp_tls = True
# Routes reports to per-client indices based on domain.
# Auto-managed by dmarcmsp — do not edit manually.
index_prefix_domain_map = /etc/parsedmarc_domain_map.yaml

[mailbox]
watch = True
delete = False

[maildir]
path = /var/mail/dmarc
create = False

[opensearch]
hosts = https://opensearch:9200
username = admin
password = CHANGEME
ssl = True
skip_certificate_verification = True
